name: Build openEuler RISC-V Rootfs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup BuildX
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/riscv64
        cleanup: true

    - name: Create a new builder instance
      run: docker buildx create --use --name insecure-builder --buildkitd-flags '--allow-insecure-entitlement security.insecure'

    - name: Build Docker image
      run: docker buildx build --load -t rootfs-builder .

    - name: Build rootfs
      run: |
        mkdir -p output
        docker run --rm --privileged \
          -v $(pwd)/output:/output \
          -v /dev:/dev \
          -v /dev/pts:/dev/pts \
          -v /sys:/sys \
          -v /proc:/proc \
          rootfs-builder \
          bash /workspace/build-rootfs.sh

    - name: Display build artifacts
      run: |
        ls -lh output/
        du -sh --apparent-size output/*.zst output/*.tar.gz 2>/dev/null || true

    - name: Upload zst artifact
      uses: actions/upload-artifact@v4
      with:
        name: openeuler-rootfs.img.zst
        path: output/*.zst
        retention-days: 30

    - name: Upload tar.gz artifact
      uses: actions/upload-artifact@v4
      with:
        name: openeuler-rootfs.tar.gz
        path: output/*.tar.gz
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        files: |
          output/*.zst
          output/*.tar.gz
        overwrite: true
        prerelease: true
        body: |
          自动构建的 openEuler RISC-V rootfs 镜像
          
          下载：
          - `openeuler-rootfs.img.zst` - zstd 压缩的 ext4 镜像
          - `openeuler-rootfs.tar.gz` - tar.gz 压缩包
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
