name: Build RISC-V64 Rootfs

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - name: openeuler
            dockerfile: Dockerfile
          - name: openruyi
            dockerfile: Dockerfile.openruyi

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup BuildX
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/riscv64
        cleanup: true

    - name: Create a new builder instance
      run: docker buildx create --use --name insecure-builder --buildkitd-flags '--allow-insecure-entitlement security.insecure'

    - name: Build Docker image for ${{ matrix.distro.name }}
      run: docker buildx build --load -f ${{ matrix.distro.dockerfile }} -t rootfs-builder-${{ matrix.distro.name }} .

    - name: Build ${{ matrix.distro.name }} rootfs
      run: |
        mkdir -p output
        docker run --rm --privileged \
          -v $(pwd)/output:/output \
          -v /dev:/dev \
          -v /dev/pts:/dev/pts \
          -v /sys:/sys \
          -v /proc:/proc \
          rootfs-builder-${{ matrix.distro.name }} \
          bash /workspace/build-rootfs.sh ${{ matrix.distro.name }}

    - name: Display build artifacts
      run: |
        ls -lh output/
        du -sh --apparent-size output/*.zst output/*.tar.gz 2>/dev/null || true

    - name: Upload zst artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro.name }}-rootfs.img.zst
        path: output/*.zst
        retention-days: 30

    - name: Upload tar.gz artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro.name }}-rootfs.tar.gz
        path: output/*.tar.gz
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: find artifacts -type f -name "*.zst" -o -name "*.tar.gz"

    - name: Generate release tag
      id: tag
      run: |
        # Generate timestamp-based tag
        release_tag="v$(date +%Y%m%d_%H%M%S)"
        echo "release_tag=${release_tag}" >> $GITHUB_OUTPUT
        echo "release_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

    - name: Create Timestamped Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: |
          artifacts/**/**/*.zst
          artifacts/**/**/*.tar.gz
        prerelease: false
        body: |
          自动构建的 RISC-V64 rootfs 镜像
          
          构建时间: ${{ steps.tag.outputs.release_date }}
          
          下载：
          - `openeuler-rootfs.img.zst` - openEuler RISC-V64 (RVA20) zstd 压缩镜像
          - `openeuler-rootfs.tar.gz` - openEuler RISC-V64 (RVA20) tar.gz 压缩包
          - `openruyi-rootfs.img.zst` - openRuyi RISC-V64 (RVA23) zstd 压缩镜像
          - `openruyi-rootfs.tar.gz` - openRuyi RISC-V64 (RVA23) tar.gz 压缩包
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        files: |
          artifacts/**/**/*.zst
          artifacts/**/**/*.tar.gz
        overwrite: true
        prerelease: true
        body: |
          最新自动构建的 RISC-V64 rootfs 镜像
          
          此 release 会自动更新为最新版本。
          历史版本请查看其他带时间戳的 release。
          
          下载：
          - `openeuler-rootfs.img.zst` - openEuler RISC-V64 (RVA20) zstd 压缩镜像
          - `openeuler-rootfs.tar.gz` - openEuler RISC-V64 (RVA20) tar.gz 压缩包
          - `openruyi-rootfs.img.zst` - openRuyi RISC-V64 (RVA23) zstd 压缩镜像
          - `openruyi-rootfs.tar.gz` - openRuyi RISC-V64 (RVA23) tar.gz 压缩包
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}