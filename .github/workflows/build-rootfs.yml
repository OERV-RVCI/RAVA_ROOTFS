name: Build RISC-V64 Rootfs

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'latest'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - name: openEuler-24.03-LTS-SP3-RVA20
            repo: openEuler-24.03-LTS-SP3-RVA20
          - name: openEuler-24.03-LTS-SP3-RVA20-selinux
            repo: openEuler-24.03-LTS-SP3-RVA20
          - name: openEuler-24.03-LTS-SP3-RVA23
            repo: openEuler-24.03-LTS-SP3-RVA23
          - name: openEuler-24.03-LTS-SP3-RVA23-selinux
            repo: openEuler-24.03-LTS-SP3-RVA23
          - name: openEuler-24.03-LTS-SP2
            repo: openEuler-24.03-LTS-SP2
          - name: openEuler-24.03-LTS-SP2-selinux
            repo: openEuler-24.03-LTS-SP2
          - name: openruyi-rva23
            repo: openruyi-rva23
          - name: openruyi-rva20
            repo: openruyi-rva20

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup BuildX
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/riscv64
        cleanup: true

    - name: Create a new builder instance
      run: docker buildx create --use --name insecure-builder --buildkitd-flags '--allow-insecure-entitlement security.insecure'

    - name: Build Docker image
      run: |
        tag_name=$(echo "${{ matrix.distro.name }}" | sed 's/.*/\L&/')
        docker buildx build --load -f Dockerfile -t rootfs-builder-${tag_name} .

    - name: Build ${{ matrix.distro.name }} rootfs
      run: |
        tag_name=$(echo "${{ matrix.distro.name }}" | sed 's/.*/\L&/')
        mkdir -p output
        docker run --rm --privileged \
          -v $(pwd)/output:/output \
          -v /dev:/dev \
          -v /dev/pts:/dev/pts \
          -v /sys:/sys \
          -v /proc:/proc \
          rootfs-builder-${tag_name} \
          bash /workspace/build-rootfs.sh ${{ matrix.distro.name }}

    - name: Display build artifacts
      run: |
        ls -lh output/
        du -sh --apparent-size output/*.zst output/*.tar.gz 2>/dev/null || true

    - name: Upload zst artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro.name }}-rootfs.img.zst
        path: output/*.zst
        retention-days: 30

    - name: Upload tar.gz artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro.name }}-rootfs.tar.gz
        path: output/*-rootfs.tar.gz
        retention-days: 30

    - name: Upload all.tar.gz artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro.name }}-rootfs-all.tar.gz
        path: output/*-all.tar.gz
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: find artifacts -type f -name "*.zst" -o -name "*.tar.gz"

    - name: Generate release tag
      id: tag
      run: |
        # Generate timestamp-based tag
        release_tag="v$(date +%Y%m%d_%H%M%S)"
        echo "release_tag=${release_tag}" >> $GITHUB_OUTPUT
        echo "release_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

    - name: Get commit changes
      id: changes
      run: |
        # Get the most recent release tag before current commit
        current_sha=$(git rev-parse HEAD)

        prev_tag=""
        for tag in $(git tag --sort=-v:refname | grep -E '^v[0-9]{8}_[0-9]{6}$' | head -20); do
          tag_sha=$(git rev-parse "$tag" 2>/dev/null)
          if [ "$tag_sha" != "$current_sha" ]; then
            prev_tag="$tag"
            break
          fi
        done

        commits=""
        if [ -n "$prev_tag" ]; then
          commits=$(git log --oneline "$prev_tag"..HEAD 2>/dev/null || echo "")
        fi

        # Output commits using printf to handle newlines
        {
          printf 'commits<<EOF\n'
          printf '%s\n' "$commits"
          printf 'EOF\n'
        } >> $GITHUB_OUTPUT

    - name: Create Timestamped Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: |
          artifacts/**/**/*.zst
          artifacts/**/**/*.tar.gz
        prerelease: false
        body: |
          自动构建的 RISC-V64 rootfs 镜像

          构建时间: ${{ steps.tag.outputs.release_date }}

          ## 更新内容
          ${{ steps.changes.outputs.commits }}

          ## 下载
          - `openEuler-24.03-LTS-SP3-RVA20-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA20-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA20-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20) 完整包
          - `openEuler-24.03-LTS-SP3-RVA20-selinux-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20, SELinux) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA20-selinux-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20, SELinux) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA20-selinux-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20, SELinux) 完整包
          - `openEuler-24.03-LTS-SP3-RVA23-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA23-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA23-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23) 完整包
          - `openEuler-24.03-LTS-SP3-RVA23-selinux-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23, SELinux) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA23-selinux-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23, SELinux) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA23-selinux-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23, SELinux) 完整包
          - `openEuler-24.03-LTS-SP2-rootfs.img.zst` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP2-rootfs.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP2-rootfs-all.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20) 完整包
          - `openEuler-24.03-LTS-SP2-selinux-rootfs.img.zst` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20, SELinux) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP2-selinux-rootfs.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20, SELinux) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP2-selinux-rootfs-all.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20, SELinux) 完整包
          - `openruyi-rva23-rootfs.img.zst` - openRuyi RISC-V64 (RVA23) zstd 压缩镜像
          - `openruyi-rva23-rootfs.tar.gz` - openRuyi RISC-V64 (RVA23) tar.gz 压缩包
          - `openruyi-rva23-rootfs-all.tar.gz` - openRuyi RISC-V64 (RVA23) 完整包
          - `openruyi-rva20-rootfs.img.zst` - openRuyi RISC-V64 (RVA20) zstd 压缩镜像
          - `openruyi-rva20-rootfs.tar.gz` - openRuyi RISC-V64 (RVA20) tar.gz 压缩包
          - `openruyi-rva20-rootfs-all.tar.gz` - openRuyi RISC-V64 (RVA20) 完整包
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        files: |
          artifacts/**/**/*.zst
          artifacts/**/**/*.tar.gz
        overwrite: true
        prerelease: true
        body: |
          最新自动构建的 RISC-V64 rootfs 镜像

          此 release 会自动更新为最新版本。
          历史版本请查看其他带时间戳的 release。

          ## 更新内容
          ${{ steps.changes.outputs.commits }}

          ## 下载
          - `openEuler-24.03-LTS-SP3-RVA20-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA20-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA20-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20) 完整包
          - `openEuler-24.03-LTS-SP3-RVA20-selinux-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20, SELinux) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA20-selinux-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20, SELinux) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA20-selinux-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA20, SELinux) 完整包
          - `openEuler-24.03-LTS-SP3-RVA23-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA23-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA23-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23) 完整包
          - `openEuler-24.03-LTS-SP3-RVA23-selinux-rootfs.img.zst` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23, SELinux) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP3-RVA23-selinux-rootfs.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23, SELinux) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP3-RVA23-selinux-rootfs-all.tar.gz` - openEuler 24.03 LTS SP3 RISC-V64 (RVA23, SELinux) 完整包
          - `openEuler-24.03-LTS-SP2-rootfs.img.zst` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP2-rootfs.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP2-rootfs-all.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20) 完整包
          - `openEuler-24.03-LTS-SP2-selinux-rootfs.img.zst` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20, SELinux) zstd 压缩镜像
          - `openEuler-24.03-LTS-SP2-selinux-rootfs.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20, SELinux) tar.gz 压缩包
          - `openEuler-24.03-LTS-SP2-selinux-rootfs-all.tar.gz` - openEuler 24.03 LTS SP2 RISC-V64 (RVA20, SELinux) 完整包
          - `openruyi-rva23-rootfs.img.zst` - openRuyi RISC-V64 (RVA23) zstd 压缩镜像
          - `openruyi-rva23-rootfs.tar.gz` - openRuyi RISC-V64 (RVA23) tar.gz 压缩包
          - `openruyi-rva23-rootfs-all.tar.gz` - openRuyi RISC-V64 (RVA23) 完整包
          - `openruyi-rva20-rootfs.img.zst` - openRuyi RISC-V64 (RVA20) zstd 压缩镜像
          - `openruyi-rva20-rootfs.tar.gz` - openRuyi RISC-V64 (RVA20) tar.gz 压缩包
          - `openruyi-rva20-rootfs-all.tar.gz` - openRuyi RISC-V64 (RVA20) 完整包
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
