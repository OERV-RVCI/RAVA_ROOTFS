name: Build openEuler RISC-V Rootfs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup BuildX
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/riscv64
        cleanup: true

    - name: Create a new builder instance
      run: docker buildx create --use --name insecure-builder --buildkitd-flags '--allow-insecure-entitlement security.insecure'

    - name: Build Docker image
      run: |
        docker buildx build --load -t rootfs-builder .

- name: Build rootfs
      run: |
        mkdir -p output
        docker run --rm --privileged \
          -v $(pwd)/output:/output \
          rootfs-builder \
          bash /workspace/build-rootfs.sh

    - name: Display build artifacts
      run: |
        ls -lh output/
        du -sh output/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openeuler-rootfs
        path: output/
        retention-days: 30